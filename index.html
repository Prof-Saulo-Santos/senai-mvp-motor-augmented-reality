<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Visor Motor — RA SENAI Porto Ferreira</title>

  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; font-family: Arial, sans-serif; }

    #badge {
      position: fixed; top: 14px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.75); color: #fff;
      padding: 7px 18px; border-radius: 20px;
      font-size: 12px; font-weight: bold; z-index: 999; letter-spacing: 1px;
    }

    #controles {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 10px; z-index: 999;
    }

    .btn {
      padding: 12px 22px; font-size: 14px; font-weight: bold;
      border: none; border-radius: 25px; cursor: pointer;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5); letter-spacing: 0.5px;
    }
    #btn-explodir { background: #C8102E; color: #fff; }
    #btn-explodir.explodido { background: #007A33; }
    #btn-animar  { background: #2255AA; color: #fff; }

    #status {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.65); color: #fff;
      padding: 8px 18px; border-radius: 10px;
      font-size: 12px; z-index: 999; text-align: center;
    }
  </style>
</head>
<body>

  <div id="badge">🔧 Motor 3D Real — SENAI Porto Ferreira</div>
  <div id="status">📷 Aponte para o marcador HIRO</div>

  <div id="controles">
    <button class="btn" id="btn-explodir">💥 EXPLODIR</button>
    <button class="btn" id="btn-animar">▶ ANIMAÇÃO</button>
  </div>

  <!-- ===== CENA AR ===== -->
  <a-scene
    embedded
    arjs="sourceType: webcam;
          debugUIEnabled: false;
          detectionMode: mono;
          smooth: true;
          smoothCount: 5;
          smoothTolerance: 0.01;
          smoothThreshold: 2;"
    renderer="logarithmicDepthBuffer: true; antialias: true; alpha: true; precision: medium;"
    vr-mode-ui="enabled: false"
    loading-screen="enabled: false">

    <a-marker preset="hiro" id="marcador">

      <!-- Modelo real do motor carregado do .glb -->
      <!-- scale: ajuste conforme o tamanho do seu modelo -->
      <!-- rotation: -90 0 0 corrige o eixo Z→Y do Blender/Sketchfab -->
      <a-gltf-model
        id="motor"
        src="motor.glb"
        position="0 0.5 0"
        rotation="-90 0 0"
        scale="0.03 0.03 0.03"
        animation-mixer="clip: ArmatureAction; loop: once; clampWhenFinished: true;">
      </a-gltf-model>

    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <!-- ===== LÓGICA: EXPLOSÃO VIA BONES (Three.js) ===== -->
  <script>
    // -----------------------------------------------------------------
    // Posições dos ossos no estado MONTADO (valores originais do .gltf)
    // BB_3=Y:-9.5 | Main_2=Y:10 | TB_1=Y:32.5 | Cap_0=Y:30.9
    // -----------------------------------------------------------------
    const POSICOES = {
      montado: {
        'Cap_0':  { x: 0, y: 30.9, z: 0 },
        'TB_1':   { x: 0, y: 32.5, z: 0 },
        'Main_2': { x: 0, y: 10.0, z: 0 },
        'BB_3':   { x: 0, y: -9.5, z: 0 },
      },
      explodido: {
        'Cap_0':  { x: 0,  y: 90.0, z: 0  },   // tampa sobe
        'TB_1':   { x: 0,  y: 70.0, z: 0  },   // bloco top sobe
        'Main_2': { x: 0,  y: 10.0, z: 0  },   // corpo fica
        'BB_3':   { x: 0,  y:-50.0, z: 0  },   // bloco base desce
      }
    };

    // Referências
    const motorEl  = document.getElementById('motor');
    const btnExp   = document.getElementById('btn-explodir');
    const btnAnim  = document.getElementById('btn-animar');
    const status   = document.getElementById('status');

    let estaExplodido = false;
    let animandoBones = false;
    let bonesMap = {};        // nome → objeto Three.js Bone
    let modeloCarregado = false;

    // -----------------------------------------------------------------
    // Ao carregar o modelo: mapeia os ossos pelo nome
    // -----------------------------------------------------------------
    motorEl.addEventListener('model-loaded', function () {
      modeloCarregado = true;
      status.textContent = '✅ Motor carregado! Use os botões abaixo.';
      status.style.background = 'rgba(0,100,0,0.7)';

      const obj3D = this.getObject3D('mesh');

      obj3D.traverse(function(child) {
        // Captura todos os ossos (Bone) pelo nome
        if (child.isBone) {
          bonesMap[child.name] = child;
          console.log('🦴 Bone encontrado:', child.name, child.position);
        }
      });

      console.log('Bones mapeados:', Object.keys(bonesMap));
    });

    // -----------------------------------------------------------------
    // Função: anima ossos suavemente para novas posições
    // -----------------------------------------------------------------
    function animarBones(estadoAlvo, duracaoMs) {
      if (!modeloCarregado) return;
      animandoBones = true;

      const inicio = performance.now();
      const posIniciais = {};

      // Registra posição atual de cada osso
      Object.keys(estadoAlvo).forEach(nomeBone => {
        const bone = bonesMap[nomeBone];
        if (bone) {
          posIniciais[nomeBone] = {
            x: bone.position.x,
            y: bone.position.y,
            z: bone.position.z
          };
        }
      });

      function animar(agora) {
        const t = Math.min((agora - inicio) / duracaoMs, 1);
        const ease = t < 0.5 ? 2*t*t : -1+(4-2*t)*t; // easeInOut

        Object.keys(estadoAlvo).forEach(nomeBone => {
          const bone = bonesMap[nomeBone];
          if (!bone) return;
          const origem = posIniciais[nomeBone];
          const destino = estadoAlvo[nomeBone];
          bone.position.set(
            origem.x + (destino.x - origem.x) * ease,
            origem.y + (destino.y - origem.y) * ease,
            origem.z + (destino.z - origem.z) * ease
          );
        });

        if (t < 1) {
          requestAnimationFrame(animar);
        } else {
          animandoBones = false;
        }
      }

      requestAnimationFrame(animar);
    }

    // -----------------------------------------------------------------
    // Botão: EXPLODIR / MONTAR
    // -----------------------------------------------------------------
    btnExp.addEventListener('click', function() {
      if (!modeloCarregado) {
        status.textContent = '⏳ Aguarde o modelo carregar...';
        return;
      }
      if (animandoBones) return;

      estaExplodido = !estaExplodido;
      const alvo = estaExplodido ? POSICOES.explodido : POSICOES.montado;
      const dur  = estaExplodido ? 1500 : 1000;

      animarBones(alvo, dur);

      btnExp.textContent  = estaExplodido ? '🔩 MONTAR' : '💥 EXPLODIR';
      btnExp.classList.toggle('explodido', estaExplodido);
    });

    // -----------------------------------------------------------------
    // Botão: ANIMAÇÃO ORIGINAL (ArmatureAction do Sketchfab)
    // -----------------------------------------------------------------
    let animacaoAtiva = false;
    btnAnim.addEventListener('click', function() {
      if (!modeloCarregado) return;
      animacaoAtiva = !animacaoAtiva;

      motorEl.setAttribute('animation-mixer',
        animacaoAtiva
          ? 'clip: ArmatureAction; loop: repeat; timeScale: 1;'
          : 'clip: ArmatureAction; loop: once; timeScale: 0;'
      );

      btnAnim.textContent = animacaoAtiva ? '⏸ PARAR' : '▶ ANIMAÇÃO';
    });

    // -----------------------------------------------------------------
    // Feedback do marcador
    // -----------------------------------------------------------------
    document.getElementById('marcador').addEventListener('markerFound', () => {
      if (!modeloCarregado) {
        status.textContent = '⏳ Carregando motor.glb...';
      }
    });
    document.getElementById('marcador').addEventListener('markerLost', () => {
      status.textContent = '📷 Aponte para o marcador HIRO';
      status.style.background = 'rgba(0,0,0,0.65)';
    });
  </script>

</body>
</html>
