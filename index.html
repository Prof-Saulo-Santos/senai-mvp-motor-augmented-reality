<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Visor Cubos — RA SENAI Porto Ferreira</title>

  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <!-- Biblioteca necessária para o animation-mixer funcionar: -->
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; font-family: Arial, sans-serif; }

    #badge {
      position: fixed; top: 14px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.75); color: #fff;
      padding: 7px 18px; border-radius: 20px;
      font-size: 12px; font-weight: bold; z-index: 999; letter-spacing: 1px;
    }

    #controles {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 10px; z-index: 999;
    }

    .btn {
      padding: 12px 22px; font-size: 14px; font-weight: bold;
      border: none; border-radius: 25px; cursor: pointer;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5); letter-spacing: 0.5px;
    }
    #btn-explodir { background: #C8102E; color: #fff; }
    #btn-explodir.explodido { background: #007A33; }
    #btn-animar  { background: #2255AA; color: #fff; }

    #status {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.65); color: #fff;
      padding: 8px 18px; border-radius: 10px;
      font-size: 12px; z-index: 999; text-align: center;
    }
  </style>
</head>
<body>

  <div id="badge">🧊 Cubos AR — SENAI Porto Ferreira</div>
<div id="status" aria-live="polite">📷 Aponte para o marcador HIRO</div>

  <div id="controles">
    <button class="btn" id="btn-explodir">💥 EXPLODIR</button>
    <button class="btn" id="btn-animar">▶ ANIMAÇÃO</button>
  </div>

  <!-- ===== CENA AR ===== -->
  <a-scene
    embedded
    arjs="sourceType: webcam;
          debugUIEnabled: false;
          detectionMode: mono;
          smooth: true;
          smoothCount: 5;
          smoothTolerance: 0.01;
          smoothThreshold: 2;"
    renderer="logarithmicDepthBuffer: true; antialias: true; alpha: true; precision: medium;"
    vr-mode-ui="enabled: false"
    loading-screen="enabled: false">

    <a-marker preset="hiro" id="marcador">
      <a-entity light="type: ambient; intensity: 1.2; color: #ffffff"></a-entity>
      <a-entity light="type: directional; intensity: 1.0; color: #ffffff" position="0 2 2"></a-entity>

      <!-- Modelo de cubos animados carregado do .glb -->
      <a-gltf-model
        id="motor"
        src="motot-animado.glb"
        position="0 0 0"
        rotation="0 0 0"
        scale="0.18 0.18 0.18"
        animation-mixer="clip: *; loop: repeat; timeScale: 1;">
      </a-gltf-model>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <!-- ===== LÓGICA: EXPLOSÃO VIA BONES (Three.js) ===== -->
  <script>
    const motorEl  = document.getElementById('motor');
    const btnExp   = document.getElementById('btn-explodir');
    const btnAnim  = document.getElementById('btn-animar');
    const status   = document.getElementById('status');
    const marcador = document.getElementById('marcador');
    const cenaAR   = document.querySelector('a-scene');

    let estaExplodido = false;
    let modeloCarregado = false;
    let animacaoAtiva = false;
    let timeoutCarregamento = null;
    let indiceModelo = 0;
    const modelosDisponiveis = ['motot-animado.glb'];

    function atualizarStatus(mensagem, tipo = 'info') {
      status.textContent = mensagem;
      if (tipo === 'erro') {
        status.style.background = 'rgba(120, 0, 0, 0.8)';
      } else if (tipo === 'sucesso') {
        status.style.background = 'rgba(0, 100, 0, 0.7)';
      } else {
        status.style.background = 'rgba(0, 0, 0, 0.65)';
      }
    }

    function verificarAmbiente() {
      if (window.location.protocol === 'file:') {
        atualizarStatus('⚠️ Abra esta página via servidor HTTP, como http://localhost:8000, para usar câmera/AR no celular.', 'erro');
        return false;
      }

      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        atualizarStatus('⚠️ Este navegador não oferece câmera para AR.', 'erro');
        return false;
      }

      return true;
    }

    function limparTimeoutCarregamento() {
      if (timeoutCarregamento) {
        clearTimeout(timeoutCarregamento);
        timeoutCarregamento = null;
      }
    }

    function carregarModelo() {
      limparTimeoutCarregamento();
      modeloCarregado = false;

      if (!window.AFRAME) {
        atualizarStatus('⚠️ A-Frame não carregou corretamente. Verifique a conexão ou o bloqueio de scripts.', 'erro');
        return;
      }

      if (indiceModelo >= modelosDisponiveis.length) {
        atualizarStatus('❌ Não foi possível carregar nenhum modelo válido. Verifique o arquivo .glb.', 'erro');
        return;
      }

      const arquivoAtual = modelosDisponiveis[indiceModelo];
      atualizarStatus(`⏳ Carregando ${arquivoAtual}...`, 'info');
      motorEl.setAttribute('src', arquivoAtual);
      motorEl.removeAttribute('animation-mixer');

      timeoutCarregamento = setTimeout(() => {
        if (!modeloCarregado) {
          indiceModelo += 1;
          if (indiceModelo < modelosDisponiveis.length) {
            atualizarStatus(`⚠️ Falha ao carregar ${arquivoAtual}. Tentando alternativa...`, 'erro');
            carregarModelo();
          } else {
            atualizarStatus('❌ Não foi possível carregar o modelo. Verifique o arquivo .glb e a conexão.', 'erro');
          }
        }
      }, 15000);
    }

    motorEl.addEventListener('model-loaded', function () {
      limparTimeoutCarregamento();
      modeloCarregado = true;
      this.setAttribute('visible', true);
      atualizarStatus('✅ Modelo carregado. Aponte a câmera para o marcador HIRO. Se ainda não aparecer, o problema pode estar na exportação do Blender.', 'sucesso');

      this.setAttribute('animation-mixer', 'clip: *; loop: repeat; timeScale: 1;');
    });

    motorEl.addEventListener('model-error', function () {
      limparTimeoutCarregamento();
      indiceModelo += 1;
      if (indiceModelo < modelosDisponiveis.length) {
        atualizarStatus('⚠️ Modelo falhou ao carregar. Tentando outro arquivo...', 'erro');
        carregarModelo();
      } else {
        atualizarStatus('❌ Não foi possível carregar o modelo. Verifique o arquivo .glb e a conexão.', 'erro');
      }
    });

    btnExp.addEventListener('click', function () {
      if (!modeloCarregado) {
        atualizarStatus('⏳ Aguarde o modelo carregar...', 'info');
        return;
      }

      estaExplodido = !estaExplodido;
      const novaEscala = estaExplodido ? 0.24 : 0.18;
      motorEl.setAttribute('scale', `${novaEscala} ${novaEscala} ${novaEscala}`);

      btnExp.textContent  = estaExplodido ? '🔄 VOLTAR' : '💥 EXPLODIR';
      btnExp.classList.toggle('explodido', estaExplodido);
    });

    btnAnim.addEventListener('click', function () {
      if (!modeloCarregado) {
        atualizarStatus('⏳ Aguarde o modelo carregar para usar a animação.', 'info');
        return;
      }

      animacaoAtiva = !animacaoAtiva;
      motorEl.setAttribute('animation-mixer',
        animacaoAtiva
          ? 'clip: *; loop: repeat; timeScale: 1;'
          : 'clip: *; loop: once; timeScale: 0;'
      );

      btnAnim.textContent = animacaoAtiva ? '⏸ PARAR' : '▶ ANIMAÇÃO';
    });

    marcador.addEventListener('markerFound', () => {
      motorEl.setAttribute('visible', true);
      if (!modeloCarregado) {
        atualizarStatus('⏳ Carregando o modelo 3D...', 'info');
      } else {
        atualizarStatus('✅ Marcador encontrado. Se o modelo ainda não aparecer, ajuste a exportação do Blender (origem, escala e aplica transformações).', 'sucesso');
      }
    });

    marcador.addEventListener('markerLost', () => {
      motorEl.setAttribute('visible', false);
      atualizarStatus('📷 Aponte para o marcador HIRO', 'info');
    });

    let escalaAtual = 0.18;
    let distanciaInicialPinca = null;
    let escalaInicialPinca = null;

    function aplicarZoom(novoValor) {
      escalaAtual = Math.max(0.01, Math.min(0.15, novoValor));
      motorEl.setAttribute('scale', `${escalaAtual} ${escalaAtual} ${escalaAtual}`);
    }

    function getDistancia(toque1, toque2) {
      const dx = toque1.clientX - toque2.clientX;
      const dy = toque1.clientY - toque2.clientY;
      return Math.sqrt(dx * dx + dy * dy);
    }

    if (cenaAR) {
      cenaAR.addEventListener('camera-error', () => {
        atualizarStatus('⚠️ Não foi possível acessar a câmera. Conceda permissão e tente novamente.', 'erro');
      });

      cenaAR.addEventListener('arjs-not-loaded', () => {
        atualizarStatus('⚠️ AR.js não iniciou corretamente. Verifique a conexão e o ambiente HTTPS/HTTP.', 'erro');
      });
    }

    verificarAmbiente();

    window.addEventListener('touchstart', (e) => {
      if (e.touches.length === 2) {
        distanciaInicialPinca = getDistancia(e.touches[0], e.touches[1]);
        escalaInicialPinca = escalaAtual;
      }
    }, { passive: false });

    window.addEventListener('touchmove', (e) => {
      if (e.touches.length === 2 && distanciaInicialPinca !== null) {
        const novaDistancia = getDistancia(e.touches[0], e.touches[1]);
        const proporcao = novaDistancia / distanciaInicialPinca;
        const novoZoom = escalaInicialPinca * proporcao;
        aplicarZoom(novoZoom);
      }
    }, { passive: false });

    window.addEventListener('touchend', (e) => {
      if (e.touches.length < 2) {
        distanciaInicialPinca = null;
        escalaInicialPinca = null;
      }
    });

    carregarModelo();
  </script>

</body>
</html>
